<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Threat Intel</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0D1117;
  --card:#161B22;
  --border:#2D333B;
  --primary:#EF4444;
  --primary-dim:rgba(239,68,68,0.12);
  --success:#22C55E;
  --success-dim:rgba(34,197,94,0.12);
  --warning:#F59E0B;
  --warning-dim:rgba(245,158,11,0.12);
  --danger:#EF4444;
  --danger-dim:rgba(239,68,68,0.12);
  --text:#F8FAFC;
  --muted:#94A3B8;
  --muted-faint:#64748B;
  --mono:'JetBrains Mono','IBM Plex Mono',monospace;
  --sans:Inter,system-ui,-apple-system,sans-serif
}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:var(--sans);color:var(--text);font-size:13px;-webkit-font-smoothing:antialiased}
#app{display:flex;flex-direction:column;height:100vh}

/* Header */
#header{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 14px;height:44px;border-bottom:1px solid var(--border);
  flex-shrink:0
}
    .wordmark{display:flex;align-items:center;gap:8px}
    .wordmark img{width:18px;height:18px;border-radius:4px;flex-shrink:0}
    .wordmark span{font-size:13px;font-weight:700;letter-spacing:-0.2px}
.header-actions{display:flex;align-items:center;gap:6px}
.header-btn{
  background:transparent;border:1px solid var(--border);border-radius:6px;
  color:var(--muted);cursor:pointer;font-size:10px;font-weight:600;
  padding:4px 10px;line-height:1.3;text-decoration:none;transition:all .15s
}
.header-btn:hover{color:var(--text);border-color:var(--muted-faint)}

/* Search */
#search-area{padding:10px 14px;flex-shrink:0}
.search-wrap{
  display:flex;align-items:center;gap:8px;
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:0 12px;transition:border-color .15s
}
.search-wrap:focus-within{border-color:var(--primary)}
.search-wrap svg{width:16px;height:16px;color:var(--muted-faint);flex-shrink:0}
#search-input{
  flex:1;border:none;outline:none;background:transparent;
  font-family:var(--mono);font-size:12px;color:var(--text);
  padding:10px 0;caret-color:var(--primary)
}
#search-input::placeholder{color:var(--muted-faint)}
#search-btn{
  border:none;background:transparent;color:var(--muted-faint);
  cursor:pointer;padding:4px;display:flex;align-items:center;
  transition:color .15s
}
#search-btn:disabled{opacity:.3;cursor:default}
#search-btn:not(:disabled):hover{color:var(--primary)}

/* Messages */
#messages{flex:1;overflow-y:auto;padding:6px 0}
#messages::-webkit-scrollbar{width:4px}
#messages::-webkit-scrollbar-track{background:transparent}
#messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* Welcome */
#welcome{
  display:flex;flex-direction:column;align-items:center;
  padding:40px 24px;text-align:center
}
.welcome-icon{
  width:44px;height:44px;border-radius:12px;
  background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;
  margin-bottom:14px
}
.welcome-icon img{width:24px;height:24px}
.welcome-title{font-size:16px;font-weight:700;margin-bottom:4px}
.welcome-sub{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:18px}
.sample-chips{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:12px}
.sample-chip{
  font-family:var(--mono);font-size:11px;font-weight:600;
  padding:6px 12px;border-radius:8px;cursor:pointer;
  background:var(--card);border:1px solid var(--border);color:var(--muted);
  transition:all .15s
}
.sample-chip:hover{color:var(--text);border-color:var(--primary);background:var(--primary-dim)}
.sample-hint{font-size:10px;color:var(--muted-faint)}

/* Verdict Card */
.verdict-card{
  margin:6px 14px;background:var(--card);border:1px solid var(--border);
  border-radius:14px;overflow:hidden
}
.verdict-section{padding:14px 16px}
.verdict-section+.verdict-section{border-top:1px solid var(--border)}

/* Header section */
.v-header{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.v-ioc{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--text);word-break:break-all;line-height:1.3;flex:1}
.v-actions{display:flex;gap:4px;flex-shrink:0}
.copy-btn,.explain-btn{
  background:transparent;border:1px solid var(--border);border-radius:6px;
  color:var(--muted);cursor:pointer;padding:5px 8px;line-height:1;
  display:flex;align-items:center;gap:4px;font-size:10px;font-weight:600;
  font-family:inherit;transition:all .15s
}
.copy-btn:hover{color:var(--success);border-color:var(--success)}
.explain-btn:hover{color:var(--primary);border-color:var(--primary)}
.copy-btn.copied{color:var(--success);border-color:var(--success);background:var(--success-dim)}
.v-badge-row{display:flex;align-items:center;gap:10px;margin-top:10px}
.v-badge{
  display:inline-flex;align-items:center;gap:6px;
  font-family:var(--mono);font-size:13px;font-weight:800;letter-spacing:.5px;
  padding:5px 14px;border-radius:8px;border:1.5px solid
}
.v-badge .dot{width:8px;height:8px;border-radius:50%}
.v-badge.MALICIOUS,.v-badge.CRITICAL{color:#EF4444;background:rgba(239,68,68,0.1);border-color:rgba(239,68,68,0.3)}
.v-badge.MALICIOUS .dot,.v-badge.CRITICAL .dot{background:#EF4444}
.v-badge.HIGH{color:#F59E0B;background:rgba(245,158,11,0.1);border-color:rgba(245,158,11,0.3)}
.v-badge.HIGH .dot{background:#F59E0B}
.v-badge.SUSPICIOUS,.v-badge.MEDIUM{color:#F59E0B;background:rgba(245,158,11,0.08);border-color:rgba(245,158,11,0.2)}
.v-badge.SUSPICIOUS .dot,.v-badge.MEDIUM .dot{background:#F59E0B}
.v-badge.LOW{color:#22C55E;background:rgba(34,197,94,0.1);border-color:rgba(34,197,94,0.25)}
.v-badge.LOW .dot{background:#22C55E}
.v-badge.CLEAN{color:#22C55E;background:rgba(34,197,94,0.1);border-color:rgba(34,197,94,0.25)}
.v-badge.CLEAN .dot{background:#22C55E}
.v-badge.UNKNOWN{color:var(--muted-faint);background:rgba(100,116,139,0.1);border-color:rgba(100,116,139,0.3)}
.v-badge.UNKNOWN .dot{background:var(--muted-faint)}

/* Confidence bar */
.conf-section{display:flex;align-items:center;gap:12px}
.conf-label{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--muted);white-space:nowrap}
.conf-bar-wrap{flex:1;height:8px;background:#0D1117;border-radius:4px;overflow:hidden}
.conf-bar-fill{height:100%;border-radius:4px;transition:width .6s ease}
.conf-pct{font-family:var(--mono);font-size:13px;font-weight:700;min-width:36px;text-align:right}

/* Risk grid */
.v-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.v-grid-item{}
.v-grid-label{font-family:var(--mono);font-size:9px;color:var(--muted-faint);text-transform:uppercase;letter-spacing:.5px;font-weight:700;margin-bottom:2px}
.v-grid-value{font-size:13px;font-weight:600;color:var(--text);font-family:var(--mono)}

/* Findings */
.findings-list{display:flex;flex-direction:column;gap:5px}
.finding{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);line-height:1.3}
.finding .check{width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.finding .check svg{width:10px;height:10px}
.finding.good .check{background:var(--success-dim)}
.finding.good .check svg{color:var(--success)}
.finding.bad .check{background:var(--danger-dim)}
.finding.bad .check svg{color:var(--danger)}

/* MITRE */
.mitre-row{display:flex;flex-wrap:wrap;gap:6px}
.mitre-chip{
  font-family:var(--mono);font-size:10px;font-weight:700;
  padding:4px 10px;border-radius:6px;color:var(--muted);
  background:rgba(148,163,184,0.06);border:1px solid var(--border);
  text-decoration:none;transition:all .15s;display:inline-flex;align-items:center;gap:4px
}
.mitre-chip:hover{color:var(--text);border-color:var(--primary);background:var(--primary-dim)}
.mitre-chip .tid{color:var(--primary)}
.mitre-chip .tname{color:var(--muted-faint);max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:400;font-size:9px}

/* Explanation */
.explain-text{font-size:12px;color:var(--muted);line-height:1.6}
.explain-skeleton{height:32px;background:var(--border);border-radius:6px;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:.6}}

/* Explain panel */
.explain-panel{padding:0 16px 14px}

/* Section title */
.section-title{
  font-family:var(--mono);font-size:9px;color:var(--muted-faint);
  text-transform:uppercase;letter-spacing:.8px;font-weight:700;margin-bottom:8px
}

/* Toast */
#toast-container{
  position:fixed;bottom:60px;left:50%;transform:translateX(-50%);
  z-index:1000;display:flex;flex-direction:column;align-items:center;gap:6px;pointer-events:none
}
.toast{
  font-family:var(--mono);font-size:10px;padding:8px 16px;
  border-radius:8px;white-space:nowrap;animation:toast-in .2s ease;
  pointer-events:auto
}
.toast-info{background:var(--card);border:1px solid var(--border);color:var(--muted)}
.toast-error{background:var(--danger-dim);border:1px solid rgba(239,68,68,0.2);color:var(--danger)}
.toast-success{background:var(--success-dim);border:1px solid rgba(34,197,94,0.2);color:var(--success)}
@keyframes toast-in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* Live Feed */
#live-feed-container{
  flex-shrink:0;border-bottom:1px solid var(--border);
  max-height:140px;overflow-y:auto;display:none;
  background:var(--card);margin:0 14px 4px;border-radius:10px
}
#live-feed-container::-webkit-scrollbar{width:3px}
#live-feed-container::-webkit-scrollbar-track{background:transparent}
#live-feed-container::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
#live-header{
  display:flex;align-items:center;gap:6px;
  padding:8px 12px 4px;font-size:9px;font-weight:700;
  color:var(--muted-faint);text-transform:uppercase;letter-spacing:.6px;
  font-family:var(--mono);position:sticky;top:0;background:var(--card);z-index:1
}
#live-count{
  margin-left:auto;font-size:9px;background:var(--border);
  padding:1px 6px;border-radius:4px;color:var(--muted);font-weight:600
}
#live-list{display:flex;flex-direction:column;gap:1px;padding:0 8px 6px}
.live-item{
  display:flex;align-items:center;gap:6px;
  padding:4px 8px;border-radius:6px;font-size:11px;
  font-family:var(--mono);cursor:pointer;transition:background .12s
}
.live-item:hover{background:var(--primary-dim)}
.live-item .live-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.live-item .live-ioc{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.live-item .live-type{
  font-size:8px;font-weight:700;color:var(--muted-faint);
  background:var(--border);padding:1px 5px;border-radius:3px;text-transform:uppercase;letter-spacing:.3px
}

/* Thinking */
.thinking-wrap{display:flex;align-items:center;gap:8px;padding:8px 14px}
.thinking-dots{display:flex;gap:4px;padding:8px 14px}
.thinking-dots span{width:5px;height:5px;border-radius:50%;background:var(--primary);animation:blink 1.2s ease infinite}
.thinking-dots span:nth-child(2){animation-delay:.2s}
.thinking-dots span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,100%{opacity:.25}50%{opacity:1}}
</style>
</head>
<body>
<div id="app">
  <header id="header">
    <div class="wordmark">
      <img src="icons/brand-icon.png" alt="">
      <span>Threat Intel</span>
    </div>
    <div class="header-actions">
      <a class="header-btn" id="dashBtn" href="http://localhost:5173" target="_blank" rel="noopener">Dashboard</a>
      <button class="header-btn" id="clearBtn">Clear</button>
    </div>
  </header>

  <div id="search-area">
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input type="text" id="search-input" placeholder="Enter IP, domain, or hash..." spellcheck="false" autofocus>
      <button id="search-btn" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </button>
    </div>
  </div>

  <div id="live-feed-container">
    <div id="live-header">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:12px;height:12px;flex-shrink:0;color:var(--primary)"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <span>Live Detections</span>
      <span id="live-count">0</span>
    </div>
    <div id="live-list"></div>
  </div>

  <div id="messages">
    <div id="welcome">
      <div class="welcome-icon">
        <img src="icons/brand-icon.png" alt="" style="width:24px;height:24px">
      </div>
      <div class="welcome-title">Threat Intel Agent</div>
      <div class="welcome-sub">Enter an IOC below to investigate, or right-click any IOC on a page</div>
      <div class="sample-chips" id="sampleIocs"></div>
    </div>
  </div>

  <div id="toast-container"></div>
</div>
<script src="sidebar.js"></script>
</body>
</html>
