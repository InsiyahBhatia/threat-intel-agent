<!DOCTYPE html>
<html>
<head><meta charset="utf-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0D1117;color:#F8FAFC;font-family:Inter,system-ui,-apple-system,sans-serif;font-size:14px;padding:32px;max-width:520px;margin:0 auto}
h1{font-size:22px;margin-bottom:24px;color:#EF4444;font-weight:700}
.grp{margin-bottom:20px}
label{display:block;font-size:10px;color:#64748B;margin-bottom:5px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;font-family:'JetBrains Mono',monospace}
input[type="text"]{width:100%;background:#161B22;border:1px solid #2D333B;border-radius:8px;padding:10px 12px;color:#F8FAFC;font-size:13px;font-family:'JetBrains Mono',monospace;outline:none;transition:border-color .15s}
input[type="text"]:focus{border-color:#EF4444}
.hint{font-size:11px;color:#64748B;margin-top:4px}
.row{display:flex;align-items:center;gap:10px;padding:12px 14px;background:#161B22;border-radius:8px;border:1px solid #2D333B}
.row label{margin-bottom:0;text-transform:none;letter-spacing:0;font-weight:400;font-family:inherit;color:#94A3B8}
input[type="checkbox"]{width:18px;height:18px;accent-color:#EF4444;cursor:pointer;flex-shrink:0}
.btn-row{display:flex;gap:10px;margin-top:24px}
.btn{background:#EF4444;color:#fff;border:none;border-radius:8px;padding:10px 22px;font-weight:700;font-size:12px;cursor:pointer;transition:all .15s;font-family:inherit}
.btn:hover{background:#dc2626}
.btn.sec{background:transparent;border:1px solid #2D333B;color:#94A3B8}
.btn.sec:hover{border-color:#EF4444;color:#EF4444}
.stat{font-size:11px;margin-top:12px;padding:8px 12px;border-radius:6px;font-family:'JetBrains Mono',monospace}
.stat.suc{background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);color:#22C55E}
.stat.err{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#EF4444}
.stat.info{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);color:#EF4444}
.ver{margin-top:32px;font-size:10px;color:#2D333B;text-align:center;font-family:'JetBrains Mono',monospace}
</style>
</head>
<body>
<h1>Settings</h1>
<div class="grp"><label>API Base URL</label><input type="text" id="apiUrl" placeholder="http://localhost:8000"><div class="hint">Your Threat Intel Agent backend server</div></div>
<div class="grp"><label>API Key (optional)</label><input type="text" id="apiKey" placeholder="Bearer token for authenticated backends"><div class="hint">Leave blank if TIA_DISABLE_AUTH=true on server</div></div>
<div class="row"><input type="checkbox" id="autoScan"><label>Auto-scan pages for IOCs on load</label></div>
<div class="btn-row"><button class="btn" id="saveBtn">Save</button><button class="btn sec" id="testBtn">Test Connection</button></div>
<div id="stat" class="stat"></div>
<div class="ver">Threat Intel Agent v1.0.0</div>
<script src="options.js"></script>
</body>
</html>
