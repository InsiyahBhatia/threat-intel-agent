<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Threat Intel</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:280px;background:#0D1117;color:#F8FAFC;font-family:Inter,system-ui,-apple-system,sans-serif;font-size:12px;padding:14px}
.brand{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.brand-icon img{width:22px;height:22px;border-radius:6px}
.brand-text{font-size:14px;font-weight:700}
.brand-sub{font-size:8px;color:#64748B;text-transform:uppercase;letter-spacing:.04em}
.btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;background:#161B22;color:#94A3B8;border:1px solid #2D333B;border-radius:8px;padding:9px;font-size:11px;font-weight:600;cursor:pointer;margin-bottom:5px;transition:all .15s;font-family:inherit}
.btn:hover{color:#F8FAFC;border-color:#EF4444;background:rgba(239,68,68,0.08)}
.btn:disabled{opacity:.4;cursor:default}
.btn:disabled:hover{border-color:#2D333B;color:#94A3B8;background:transparent}
.btn svg{width:14px;height:14px;flex-shrink:0}
.row{display:flex;gap:5px;margin-bottom:5px}
.row .btn{width:auto;flex:1;margin-bottom:0}
.input-wrap{display:flex;gap:5px;margin-bottom:5px}
.input-wrap input{flex:1;background:#161B22;border:1px solid #2D333B;border-radius:8px;padding:9px 10px;color:#F8FAFC;font-size:11px;font-family:'JetBrains Mono',monospace;outline:none;transition:border-color .15s}
.input-wrap input:focus{border-color:#EF4444}
.input-wrap input::placeholder{color:#64748B}
.stat{text-align:center;font-family:'JetBrains Mono',monospace;font-size:9px;color:#64748B;padding:5px 8px;border-radius:6px;background:#161B22;border:1px solid #2D333B;margin-top:6px}
.stat-row{display:flex;gap:6px;margin-bottom:5px}
.stat-box{flex:1;text-align:center;padding:6px 4px;border-radius:6px;background:#161B22;border:1px solid #2D333B}
.stat-num{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;color:#F8FAFC;line-height:1.2}
.stat-lbl{font-size:8px;color:#64748B;text-transform:uppercase;letter-spacing:.4px}
.sep{height:1px;background:#2D333B;margin:6px 0}
</style>
</head>
<body>
<div class="brand">
  <div class="brand-icon"><img src="icons/brand-icon.png" alt=""></div>
  <div><div class="brand-text">Threat Intel</div><div class="brand-sub">Agent</div></div>
</div>

<div class="stat-row">
  <div class="stat-box"><div class="stat-num" id="pageIocCount">-</div><div class="stat-lbl">IOCs on page</div></div>
  <div class="stat-box"><div class="stat-num" id="totalDetections">-</div><div class="stat-lbl">Total Detections</div></div>
</div>

<div class="input-wrap">
  <input type="text" id="quickIoc" placeholder="IP, domain, or hash..." spellcheck="false">
  <button class="btn" id="quickSearchBtn" style="flex:0 0 auto;padding:9px 12px" disabled>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
  </button>
</div>

<div class="row">
  <button class="btn" id="openSidebar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg> Sidebar</button>
  <button class="btn" id="investigateClipboard"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Clipboard</button>
  <button class="btn" id="openSettings"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
</div>

<div class="stat" id="status">Checking API...</div>
<script src="popup.js"></script>
</body>
</html>
