<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Threat Intel</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:240px;background:#0D1117;color:#F8FAFC;font-family:Inter,system-ui,-apple-system,sans-serif;font-size:12px;padding:16px}
.brand{display:flex;align-items:center;gap:10px;margin-bottom:16px}
    .brand-icon{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;overflow:hidden}
    .brand-icon img{width:20px;height:20px}
.brand-text{font-size:14px;font-weight:700;color:#F8FAFC;line-height:1}
.brand-sub{font-size:9px;color:#64748B;font-weight:600;font-family:'JetBrains Mono',monospace;letter-spacing:.04em;text-transform:uppercase;line-height:1;margin-top:1px}
.btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;background:#161B22;color:#94A3B8;border:1px solid #2D333B;border-radius:8px;padding:10px;font-size:11px;font-weight:600;cursor:pointer;margin-bottom:6px;transition:all .15s;font-family:inherit}
.btn:hover{color:#F8FAFC;border-color:#EF4444;background:rgba(239,68,68,0.08)}
.btn svg{width:14px;height:14px;flex-shrink:0}
.stat{text-align:center;font-family:'JetBrains Mono',monospace;font-size:9px;color:#64748B;margin-top:8px;padding:6px 10px;border-radius:6px;background:#161B22;border:1px solid #2D333B}
</style>
</head>
<body>
<div class="brand">
  <div class="brand-icon"><img src="icons/brand-icon.png" alt=""></div>
  <div><div class="brand-text">Threat Intel</div><div class="brand-sub">Agent</div></div>
</div>
<button class="btn" id="openSidebar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg> Open Sidebar</button>
<button class="btn" id="openSettings"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg> Settings</button>
<div class="stat" id="status">Checking API...</div>
<script src="popup.js"></script>
</body>
</html>
